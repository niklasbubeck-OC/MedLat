# Run tests, lint, and type checks on every push and pull request.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          # Install just the tools — avoids a heavy torch install for a lint-only job.
          pip install "ruff>=0.5.0" "black>=23.0.0"

      # TODO: drop `continue-on-error` once any baseline violations are cleared.
      # Config lives in pyproject.toml [tool.ruff].
      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check medlat tests

      - name: Black (format check)
        run: black --check medlat tests

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (smoke + round-trip + compatibility)
        run: pytest tests/ -v --tb=short --cov=medlat --cov-report=xml --cov-report=term

      - name: Registry integration script (full suite)
        run: python tests/registry_integration.py

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # TODO: drop `continue-on-error` once the scoped file list in
      # pyproject.toml [tool.mypy] is clean. It previously ran with `|| true`,
      # so we don't know if it passes today — flip this when verified.
      - name: Mypy
        continue-on-error: true
        run: mypy
